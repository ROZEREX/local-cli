<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>local-cli</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            bg: "#16161e", surface: "#1a1b26", panel: "#1f2335", panel2: "#24283b",
            edge: "#2a2e42", ink: "#c0caf5", dim: "#565f89",
            primary: "#7aa2f7", accent: "#7dcfff", teal: "#73daca", grn: "#9ece6a",
            warn: "#e0af68", danger: "#f7768e",
          },
          fontFamily: { mono: ["Cascadia Code", "JetBrains Mono", "Consolas", "monospace"] },
          keyframes: {
            rise: { "0%": { opacity: 0, transform: "translateY(8px)" }, "100%": { opacity: 1, transform: "none" } },
            pop: { "0%": { opacity: 0, transform: "scale(.96)" }, "100%": { opacity: 1, transform: "scale(1)" } },
            slidein: { "0%": { opacity: 0, transform: "translateX(-10px)" }, "100%": { opacity: 1, transform: "none" } },
            shimmer: { "100%": { transform: "translateX(100%)" } },
            blink: { "0%,100%": { opacity: 1 }, "50%": { opacity: 0 } },
          },
          animation: {
            rise: "rise .22s ease both", pop: "pop .16s ease both", slidein: "slidein .2s ease both",
            blink: "blink 1s step-end infinite",
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-bg text-ink font-sans antialiased">
  <div id="app" class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-72 shrink-0 border-r border-edge bg-surface/80 backdrop-blur flex flex-col transition-all duration-200">
      <div class="p-3 flex items-center gap-2 border-b border-edge">
        <span class="text-accent text-lg">◆</span>
        <span class="font-bold tracking-wide bg-gradient-to-r from-accent via-primary to-teal bg-clip-text text-transparent">local-cli</span>
        <span id="conn" class="ml-1 w-2 h-2 rounded-full bg-danger" title="connection"></span>
        <button id="new-chat" class="ml-auto flex items-center gap-1 text-xs px-2.5 py-1.5 rounded-lg border border-edge hover:border-primary hover:text-white transition">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i> New
        </button>
      </div>

      <!-- Folder -->
      <button id="folder-btn" class="m-3 mb-1 text-left px-3 py-2 rounded-lg bg-panel hover:bg-panel2 border border-edge transition group">
        <div class="flex items-center gap-2 text-xs text-dim"><i data-lucide="folder" class="w-3.5 h-3.5"></i> working folder <i data-lucide="pencil" class="w-3 h-3 ml-auto opacity-0 group-hover:opacity-100"></i></div>
        <div id="cwd" class="font-mono text-[11px] text-teal truncate mt-0.5">—</div>
      </button>

      <div class="px-3 pt-2 pb-1 text-[11px] uppercase tracking-wider text-dim flex items-center gap-1">
        <i data-lucide="messages-square" class="w-3 h-3"></i> Chats
      </div>
      <div id="sessions" class="flex-1 overflow-y-auto px-2 space-y-1"></div>

      <div class="p-3 border-t border-edge grid grid-cols-2 gap-2">
        <button data-panel="browser" class="side-act"><i data-lucide="globe" class="w-3.5 h-3.5"></i> Browser</button>
        <button data-panel="system" class="side-act"><i data-lucide="cpu" class="w-3.5 h-3.5"></i> System</button>
        <button data-panel="profiles" class="side-act"><i data-lucide="user-round-cog" class="w-3.5 h-3.5"></i> Profiles</button>
        <button data-panel="servers" class="side-act"><i data-lucide="server" class="w-3.5 h-3.5"></i> Servers</button>
        <button data-panel="ports" class="side-act"><i data-lucide="plug-zap" class="w-3.5 h-3.5"></i> Ports</button>
        <button id="learn-btn" class="side-act"><i data-lucide="graduation-cap" class="w-3.5 h-3.5"></i> Learn</button>
        <button id="init-btn" class="side-act"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i> /init</button>
        <button data-panel="commands" class="side-act"><i data-lucide="slash" class="w-3.5 h-3.5"></i> /index</button>
      </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col min-w-0">
      <header class="h-14 shrink-0 border-b border-edge bg-surface/70 backdrop-blur flex items-center gap-3 px-4">
        <button id="sidebar-toggle" class="text-dim hover:text-white"><i data-lucide="panel-left" class="w-4 h-4"></i></button>

        <div class="flex items-center gap-1.5">
          <i data-lucide="cpu" class="w-4 h-4 text-primary"></i>
          <select id="model" class="bg-panel2 border border-edge rounded-lg px-2 py-1 text-xs font-mono max-w-[220px]"></select>
          <button id="model-info" class="text-dim hover:text-accent" title="Model details"><i data-lucide="info" class="w-4 h-4"></i></button>
        </div>

        <div id="mode" class="flex rounded-lg border border-edge overflow-hidden text-xs">
          <button data-mode="normal" class="mode-btn px-2.5 py-1">normal</button>
          <button data-mode="plan" class="mode-btn px-2.5 py-1">plan</button>
          <button data-mode="auto" class="mode-btn px-2.5 py-1">auto</button>
        </div>

        <button id="think-btn" class="flex items-center gap-1 text-xs px-2 py-1 rounded-lg border border-edge text-dim hover:text-white" title="Toggle reasoning">
          <i data-lucide="brain" class="w-3.5 h-3.5"></i> think
        </button>

        <div class="ml-auto flex items-center gap-3">
          <span id="ext-badge" class="hidden items-center gap-1 text-[11px] text-grn" title="Browser extension connected — ask me to open and act on web pages"><i data-lucide="globe" class="w-3.5 h-3.5"></i> live browser</span>
          <button id="compact-btn" class="text-dim hover:text-accent" title="Compact conversation"><i data-lucide="archive" class="w-4 h-4"></i></button>
          <div class="flex items-center gap-1.5 font-mono text-[11px]">
            <i data-lucide="gauge" class="w-3.5 h-3.5 text-dim"></i>
            <span id="ctx-used">0</span><span class="text-dim">/</span><span id="ctx-limit">0</span>
            <span id="ctx-pct" class="text-dim">(0%)</span>
          </div>
        </div>
      </header>

      <main id="messages" class="flex-1 overflow-y-auto px-4 md:px-8 py-6 space-y-5"></main>

      <div class="px-4 md:px-8 pb-5 pt-2 border-t border-edge bg-surface/60">
        <div id="live" class="hidden items-center gap-2 font-mono text-[11px] text-dim mb-2"></div>
        <form id="form" class="flex items-end gap-2">
          <button id="attach" type="button" class="shrink-0 h-11 w-11 grid place-items-center rounded-xl border border-edge text-dim hover:text-accent hover:border-primary transition" title="Attach files">
            <i data-lucide="paperclip" class="w-4 h-4"></i>
          </button>
          <textarea id="input" rows="1" placeholder="Message local-cli…  (Enter to send · Shift+Enter newline)"
            class="flex-1 resize-none bg-panel border border-edge rounded-xl px-4 py-3 text-[15px] leading-relaxed max-h-52 focus:outline-none focus:border-primary transition"></textarea>
          <button id="send" type="submit" class="shrink-0 h-11 px-5 rounded-xl bg-primary text-bg font-semibold hover:bg-accent transition flex items-center gap-1.5">
            <i data-lucide="send-horizontal" class="w-4 h-4"></i>
          </button>
          <button id="stop" type="button" class="hidden shrink-0 h-11 px-5 rounded-xl bg-danger text-bg font-semibold flex items-center gap-1.5">
            <i data-lucide="square" class="w-4 h-4"></i> Stop
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal host -->
  <div id="modal" class="hidden fixed inset-0 z-50 grid place-items-center bg-black/50 backdrop-blur-sm p-4">
    <div id="modal-card" class="w-full max-w-lg max-h-[80vh] overflow-hidden rounded-2xl border border-edge bg-surface shadow-2xl animate-pop flex flex-col"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
